<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EE"/>
      <stop offset="1" stop-color="#FFFDF9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBF7F2"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E7F0FF"/>
      <stop offset="1" stop-color="#F5F9FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#A18463" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#C88A17"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#1F8B4D"/>
    </marker>
  </defs>

  <rect width="1400" height="900" rx="36" fill="url(#bg)"/>

  <text x="80" y="88" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">
    SightLine Tutor Architecture
  </text>
  <text x="80" y="126" fill="#6B6259" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Gemini Live Agent challenge submission diagram
  </text>

  <rect x="70" y="190" width="320" height="250" rx="28" fill="url(#card)" stroke="#D9CFC2" filter="url(#shadow)"/>
  <text x="102" y="232" fill="#6B6259" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">USER DEVICE</text>
  <text x="102" y="272" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Next.js Frontend</text>
  <text x="102" y="312" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="102" dy="0">Cloud Run web app</tspan>
    <tspan x="102" dy="34">Camera preview</tspan>
    <tspan x="102" dy="34">Homework snapshot capture</tspan>
    <tspan x="102" dy="34">Microphone and tutor controls</tspan>
    <tspan x="102" dy="34">Streamed tutor audio playback</tspan>
  </text>

  <rect x="510" y="150" width="380" height="330" rx="30" fill="url(#cloud)" stroke="#BFD2F2" filter="url(#shadow)"/>
  <text x="542" y="194" fill="#5270A3" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">GOOGLE CLOUD</text>
  <text x="542" y="236" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">FastAPI Backend</text>
  <text x="542" y="278" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="542" dy="0">Cloud Run service</tspan>
    <tspan x="542" dy="34">WebSocket endpoint: /ws/live</tspan>
    <tspan x="542" dy="34">Starts Gemini Live sessions</tspan>
    <tspan x="542" dy="34">Forwards text, image, and PCM audio</tspan>
    <tspan x="542" dy="34">Streams tutor text and audio back</tspan>
    <tspan x="542" dy="34">Produces Cloud Run logs</tspan>
  </text>

  <rect x="1010" y="190" width="320" height="250" rx="28" fill="url(#card)" stroke="#D9CFC2" filter="url(#shadow)"/>
  <text x="1042" y="232" fill="#6B6259" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">GOOGLE AI</text>
  <text x="1042" y="272" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Gemini Live API</text>
  <text x="1042" y="312" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="1042" dy="0">Gemini native audio model</tspan>
    <tspan x="1042" dy="34">Multimodal understanding</tspan>
    <tspan x="1042" dy="34">Audio responses</tspan>
    <tspan x="1042" dy="34">Transcripts and live turns</tspan>
  </text>

  <rect x="70" y="560" width="320" height="180" rx="28" fill="url(#card)" stroke="#D9CFC2" filter="url(#shadow)"/>
  <text x="102" y="604" fill="#6B6259" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">MULTIMODAL INPUTS</text>
  <text x="102" y="646" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Camera + Microphone</text>
  <text x="102" y="688" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="102" dy="0">Homework image snapshots</tspan>
    <tspan x="102" dy="34">Voice questions and interruptions</tspan>
  </text>

  <rect x="510" y="560" width="380" height="180" rx="28" fill="url(#card)" stroke="#D9CFC2" filter="url(#shadow)"/>
  <text x="542" y="604" fill="#6B6259" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">SUPPORTING GCP SERVICE</text>
  <text x="542" y="646" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Cloud Run Logs</text>
  <text x="542" y="688" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="542" dy="0">Used to verify deployment health,</tspan>
    <tspan x="542" dy="34">session starts, streaming, and errors</tspan>
  </text>

  <rect x="1010" y="560" width="320" height="180" rx="28" fill="url(#card)" stroke="#D9CFC2" filter="url(#shadow)"/>
  <text x="1042" y="604" fill="#6B6259" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">OUTPUTS</text>
  <text x="1042" y="646" fill="#1D1B19" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Tutor Experience</text>
  <text x="1042" y="688" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    <tspan x="1042" dy="0">Spoken tutor response</tspan>
    <tspan x="1042" dy="34">Latest tutor reply in UI</tspan>
  </text>

  <path d="M390 315H490" stroke="#4F46E5" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="404" y="290" fill="#4F46E5" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">WSS live session</text>
  <text x="410" y="338" fill="#4F46E5" font-family="Segoe UI, Arial, sans-serif" font-size="16">text, image, PCM audio</text>

  <path d="M890 315H990" stroke="#C88A17" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGold)"/>
  <text x="906" y="290" fill="#C88A17" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Google GenAI SDK</text>
  <text x="920" y="338" fill="#C88A17" font-family="Segoe UI, Arial, sans-serif" font-size="16">Gemini Live session</text>

  <path d="M390 650H490" stroke="#4F46E5" stroke-width="6" stroke-dasharray="10 10" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="404" y="632" fill="#4F46E5" font-family="Segoe UI, Arial, sans-serif" font-size="16">captured by frontend</text>

  <path d="M890 650H990" stroke="#1F8B4D" stroke-width="6" stroke-dasharray="10 10" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="906" y="632" fill="#1F8B4D" font-family="Segoe UI, Arial, sans-serif" font-size="16">returned to user</text>

  <path d="M1170 448V505C1170 536 1146 560 1115 560H920" stroke="#1F8B4D" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="968" y="534" fill="#1F8B4D" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">responses and transcripts</text>

  <path d="M700 488V540" stroke="#1F8B4D" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="720" y="526" fill="#1F8B4D" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">service logs</text>

  <rect x="70" y="800" width="1260" height="56" rx="18" fill="#F1E9DD" stroke="#D8CCBC"/>
  <text x="100" y="836" fill="#4E463F" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Challenge requirements satisfied: Gemini model + Google GenAI SDK + Google Cloud deployment on Cloud Run
  </text>
</svg>
